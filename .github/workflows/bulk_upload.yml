name: OnePlus Bulk OTA Archiver

on:
  workflow_dispatch:

jobs:
  process_otas:
    runs-on: ubuntu-latest
    steps:
      # -------------------------------------------------
      # 1. CHECKOUT
      # -------------------------------------------------
      - name: 📥 Checkout Repo
        uses: actions/checkout@v3

      # -------------------------------------------------
      # 2. FREE DISK SPACE
      # -------------------------------------------------
      - name: 🧹 Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/ghc || true
          sudo docker system prune -af || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      # -------------------------------------------------
      # 3. INSTALL TOOLS
      # -------------------------------------------------
      - name: 📦 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 p7zip-full

      # -------------------------------------------------
      # 4. PROCESS OTAS (THE LOOP)
      # -------------------------------------------------
      - name: 🔄 Process OTAs Loop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_DM: ${{ secrets.TG_DM }}
        run: |
          # -------------------------------------------------------
          # CONFIGURATION: LIST YOUR OTAS HERE
          # Format: "VERSION|URL"
          # -------------------------------------------------------
          declare -a OTAS=(
            "16.0.5.700|https://gauss-compota-c-in.allawnofs.com/remove-23ed9ce127918c65642f4ac89c592e60/g-539def48c0650ee45d48f33f1fe31a53/component-ota/26/03/11/1be4ffcd410a420393f8ef7ff2468b90.zip?sign=f866afa7dfe04852f5a8f469846c4350&t=69bb9683&x-oss-signature=kGU%2F%2BfbeesYnUMd%2FmtAwMqEavX8Anqk9tC2WT3meohs%3D&x-oss-signature-version=OSS2&x-oss-expires=1773903243&x-oss-access-key-id=LTAI5t7LQqPWs3796pRv6Avx"
          )

          # -------------------------------------------------------
          # START LOOP
          # -------------------------------------------------------
          count=0
          total=${#OTAS[@]}
          
          for item in "${OTAS[@]}"; do
            count=$((count+1))
            
            # Split string
            VERSION="${item%%|*}"
            URL="${item##*|}"
            
            TAG="CPH2661IN-${VERSION}"
            BASE_NAME="CPH2661IN-${VERSION}"
            
            echo "---------------------------------------------------"
            echo "🚀 Processing [$count/$total]: $TAG"
            echo "---------------------------------------------------"

            # Check if Release exists
            if gh release view "$TAG" >/dev/null 2>&1; then
              echo "⚠️ Release $TAG already exists. Skipping..."
              continue
            fi

            # --- DM: DOWNLOAD STARTED ---
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_DM" \
              -d text="⬇️ *Downloading Started IND * ($count/$total)%0AVersion: \`$VERSION\`" \
              -d parse_mode="Markdown" > /dev/null

            # 2. Download
            echo "⬇️ Downloading..."
            aria2c "$URL" -x16 -s16 -k1M -o ota.zip -q

            # --- DM: ZIPPING ---
            curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
              -d chat_id="$TG_DM" \
              -d text="✂️ *Zipping/Splitting...*" \
              -d parse_mode="Markdown" > /dev/null

            # 3. Split
            echo "✂️ Splitting..."
            mkdir -p split_output
            7z a -t7z -mx=0 -v1900m "split_output/${BASE_NAME}.7z" "ota.zip"

            # 4. Create Release
            echo "📦 Creating GitHub Release..."
            
            # --- NEW RELEASE NOTES FORMAT ---
            NOTES="**Region:** INDIA ( CPH 2661IN ) 🇮🇳"$'\n'"**Version:** ${VERSION} 📱"$'\n'"**Type:** Official OTA 📦"$'\n\n'"**BOOT & INIT_BOOT of this ${VERSION} can be found here :** https://t.me/boot_imgs_nord4/2"
            
            gh release create "$TAG" -t "OnePlus OTA - ${VERSION}" -n "$NOTES"

            # 5. Upload Loop (With Start/Done DMs)
            echo "📤 Uploading assets..."
            part_num=0
            
            # Enable nullglob in case of weird file matches
            shopt -s nullglob
            
            for f in split_output/*; do
               part_num=$((part_num+1))
               fname=$(basename "$f")
               
               # --- DM: UPLOAD START ---
               curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
                -d chat_id="$TG_DM" \
                -d text="🚀 *Upload Started*: $fname" \
                -d parse_mode="Markdown" > /dev/null

               # Upload (Force overwrite)
               gh release upload "$TAG" "$f" --clobber
               
               # --- DM: UPLOAD DONE ---
               curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
                -d chat_id="$TG_DM" \
                -d text="✅ *Upload Done*: $fname" \
                -d parse_mode="Markdown" > /dev/null
            done

            # 6. Cleanup
            echo "🧹 Cleaning up..."
            rm -rf ota.zip split_output
            
            echo "✅ Done with $TAG"
          done
          
          echo "🎉 All tasks finished!"

      # -------------------------------------------------
      # 5. FAILURE NOTIFICATION
      # -------------------------------------------------
      - name: ❌ DM — Pipeline Failed
        if: ${{ failure() }}
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_DM: ${{ secrets.TG_DM }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendMessage" \
          -d chat_id="$TG_DM" \
          -d text="❌ *Pipeline FAILED!* Check GitHub Actions logs for details." \
          -d parse_mode="Markdown"
